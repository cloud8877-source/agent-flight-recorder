services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: afr
      POSTGRES_PASSWORD: afr
      POSTGRES_DB: afr
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afr -d afr"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: afr
      CLICKHOUSE_USER: afr
      CLICKHOUSE_PASSWORD: afr
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/afr-payloads || true
      "

  collector:
    build:
      context: ..
      dockerfile: apps/collector/Dockerfile
    ports:
      - "4318:4318"
    environment:
      AFR_STORAGE_BACKEND: postgres
      AFR_DATABASE_URL: postgresql://afr:afr@postgres:5432/afr
      AFR_CLICKHOUSE_URL: http://afr:afr@clickhouse:8123
      AFR_OBJECT_STORAGE_ENDPOINT: http://minio:9000
      AFR_OBJECT_STORAGE_BUCKET: afr-payloads
      AFR_OBJECT_STORAGE_ACCESS_KEY: minioadmin
      AFR_OBJECT_STORAGE_SECRET_KEY: minioadmin
      AFR_HOST: 0.0.0.0
      AFR_PORT: 4318
      AFR_REPO_ROOT: /app
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  web:
    image: node:20-bookworm
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @agent-flight-recorder/web dev"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_AFR_API_URL: http://collector:4318
    volumes:
      - ..:/app
    depends_on:
      - collector