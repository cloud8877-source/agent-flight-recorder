[project]
name = "afr-cli"
version = "0.1.0"
description = "Agent Flight Recorder CLI for replay, eval, and CI regression tests"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27.0",
  "pyyaml>=6.0",
]

[project.scripts]
afr = "afr_cli.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/afr_cli"]