name: Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          corepack enable
          pnpm install
          python -m venv .venv
          .venv/bin/pip install -e apps/collector -e packages/sdk-python -e packages/cli
      - run: make test
      - run: make e2e
      - run: make policy-test
      - run: make storage-test